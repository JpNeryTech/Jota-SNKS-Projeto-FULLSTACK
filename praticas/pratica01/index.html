<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jota SNKS</title>
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="top-links">
            <span>Acessibilidade</span>
            <span>Ajuda</span>
            <span>Encontre Seu Pedido</span>
            <span>Entrar</span>
            </div>

            <div class="logo-top-bar">
                <a href="index.html">
                    <img src="imagens/logoPNG.png" alt="Logo Jota SNKS">
                </a>
            </div>

        </div>

        <div class="main-header">
            <nav class="menu-categorias">
            <a href="#">Calçados</a>
            <a href="#">Feminino</a>
            <a href="#">Masculino</a>
            <a href="#">Infantil</a>
            <a href="#">Lançamentos</a>
            <a href="#">Esportivos</a>
            </nav>
        </div>

        <div class="header-icons">

            <form class="procurar">
                <input type="search" placeholder="Procurar" aria-label="Campo de busca">

                <button type="submit" class="procurar-btn">
                    <img src="imagens/lupa.png" alt="Buscar">
                </button>
            </form>

            <button class="carrinhoCompras">
               <img src="imagens/carrinhoCompras.png" alt="Carrinho de Compras">
               <span class="quantidadeItens">0</span>
            </button>

        </div>
    
    </header>

    <section class="slogan-banner">

        <div class="slogan">
            <h2> ONDE O CONFORTO ENCONTRA A PERFORMANCE </h2>
        </div>

        <div class="slogan-logo">
            <img src="imagens/logoPNG.png" alt="Logo Jota SNKS">
        </div>

    </section>   

    <section class="banner-principal">

        <div class="banner-imagem-principal">
            <img src="imagens/imagemPrincipalBanner.png" alt="Foto de varios Tênis">
        </div>

        <div class="banner-video-logoNike">
            <video autoplay muted loop> 
                <source src="videos/videoTenisNike.mp4" type="video/mp4">
            </video>
        </div>

        <div class="banner-imagem-principal">
            <img src="imagens/imagemPrincipalBanner.png" alt="Foto de varios Tênis">
        </div>

          <div class="banner-video-logoNike">
            <video autoplay muted loop> 
                <source src="Videos/videoAirMax.mp4" type="video/mp4">
            </video>
        </div>

        <div class="banner-imagem-principal">
            <img src="imagens/imagemPrincipalBanner.png" alt="Foto de varios Tênis">
        </div>

    </section>

</body>
</html>
